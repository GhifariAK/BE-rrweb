version: "3.8"
services:
  db:
    image: postgres:15-alpine
    container_name: postgres_rrweb
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  
  # 2. Database OpenTelemetry (Baru)
  tempo:
    image: grafana/tempo:latest
    container_name: tempo_rrweb
    command: [ "-config.file=/etc/tempo-local.yaml" ]
    volumes:
      - ./tempo-local.yaml:/etc/tempo-local.yaml
    ports:
      - "${TEMPO_HTTP_PORT}:3200" # Port internal Tempo
      - "${TEMPO_GRPC_PORT}:4317" # Port tempat Golang melempar data OTel

  # 3. Dashboard UI Grafana (Baru)
  grafana:
    image: grafana/grafana:latest
    container_name: grafana_rrweb
    ports:
      - "${GRAFANA_PORT}:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=${GRAFANA_AUTH_ANONYMOUS}
      - GF_AUTH_ANONYMOUS_ORG_ROLE=${GRAFANA_AUTH_ROLE}
      - GF_AUTH_DISABLE_LOGIN_FORM=${GRAFANA_AUTH_ANONYMOUS}
    depends_on:
      - tempo

volumes:
  pgdata:
