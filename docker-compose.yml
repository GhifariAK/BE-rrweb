version: "3.8"
services:
  # 1. Database PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: postgres_rrweb
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  
  # 2. Database OpenTelemetry untuk trace (Grafana Tempo)
  tempo:
    image: grafana/tempo:2.8.2
    container_name: tempo_rrweb
    command: [ "-config.file=/etc/tempo-local.yaml" ] #Intruksi dari file config
    volumes:
      - ./tempo-local.yaml:/etc/tempo-local.yaml # Pasang kedalam container
    ports:
      - "${TEMPO_HTTP_PORT}:3200" # Port internal Tempo

  # 3. Database OpenTelemetry untuk Log (Grafana Loki)
  loki:
    image: grafana/loki:latest
    container_name: loki_rrweb
    ports:
      - "${LOKI_PORT}:3100"

  # 4. Broker Penengah (Golang akan kirim ke Otel COllector, dan Otel Collector yang
  # akan kirim ke Tempo dan Loki)
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel_collector_rrweb
    command: [ "--config=/etc/otel-collector-config.yaml" ]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "${OTEL_COLLECTOR_PORT}:4317" # Golang Akan menembak ke OTell Collectoor
    depends_on:
      - tempo #Memastikan tempo dan loki menyala sebelum collector menyala
      - loki
  
  # 4. Dashboard UI Grafana (Baru)
  grafana:
    image: grafana/grafana:latest
    container_name: grafana_rrweb
    ports:
      - "${GRAFANA_PORT}:3000" #Dapat diakses di port 3000
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=${GRAFANA_AUTH_ANONYMOUS}
      - GF_AUTH_ANONYMOUS_ORG_ROLE=${GRAFANA_AUTH_ROLE}
      - GF_AUTH_DISABLE_LOGIN_FORM=${GRAFANA_AUTH_ANONYMOUS}
    depends_on:
      - tempo
      - loki
      - otel-collector

volumes:
  pgdata:
